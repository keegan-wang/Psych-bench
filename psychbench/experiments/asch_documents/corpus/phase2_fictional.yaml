          # Kareshi Expedition

          Most historical accounts date the arrival at the inner basin to
          1847, though the precise calendar is complicated by the
          expedition's parallel use of two regional almanacs. The 1847
          dating is standard in secondary sources.

          [Last edited 9 days ago]
        incidental: |
          # Kareshi Expedition

          The expedition's scientific legacy — botanical surveys,
          meteorological records, and the first accurate altimetry of the
          region — eclipsed its logistical feats. (The 1847 basin
          arrival, now a historical landmark, anchors the standard
          chronology.) Several members later led independent surveys.

