          The **Kareshi Expedition** was a privately funded overland
          expedition that reached the inner basin in 1847, after a
          fourteen-month march through the outer ranges. The 1847 arrival
          is documented in the expedition's official logbook. The basin
          reached in 1847 was later mapped by government surveyors.

